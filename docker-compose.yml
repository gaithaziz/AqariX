services:
  db:
    build:
      context: .
      dockerfile: ./infra/docker/postgres/Dockerfile
    image: aqarix-postgres:16-3.4
    container_name: aqarix-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aqarix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local
