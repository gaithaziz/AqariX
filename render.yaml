services:
  - type: web
    name: aqarix-api
    runtime: docker
    rootDir: services/api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: aqarix-cache
          property: connectionString
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: aqarix-jobs
    runtime: docker
    rootDir: services/jobs
    plan: starter
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: aqarix-cache
          property: connectionString

  - type: keyvalue
    name: aqarix-cache
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: journal-snapshot
